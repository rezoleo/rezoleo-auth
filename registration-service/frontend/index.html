<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rézoléo Inscription</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <img src="rezoleo_logo_light_mode.png" alt="Logo Rézoléo" class="logo">
    <h1>Inscription à Rézoléo</h1>
    <p>Pour adhérer à Rézoléo, entrez votre adresse email Centralienne.</p>

    <form id="registrationForm">
        <div class="form-group">
            <label for="email">Adresse email étudiante</label>
            <input type="email" id="email" name="email" required placeholder="prenom.nom@ecole.centralelille.fr">
        </div>

        <div class="form-group">
            <label for="firstName">Prénom</label>
            <input type="text" id="firstName" name="firstName" required placeholder="Prénom">
        </div>

        <div class="form-group">
            <label for="lastName">Nom</label>
            <input type="text" id="lastName" name="lastName" required placeholder="Nom">
        </div>

        <div class="form-group checkbox-group">
            <label>
                <input type="checkbox" id="terms" required>
                <span>
                    J'ai lu et j'accepte le
                    <a href="https://ri.rezoleo.fr" target="_blank">règlement intérieur</a>
                    de Rézoléo, ainsi que la
                    <a href="https://rezoleo.fr" target="_blank">politique de confidentialité</a>.
                </span>
            </label>
        </div>

        <button type="submit">S'inscrire</button>
    </form>

    <div id="error" class="error"></div>
    <div id="success" class="success"></div>
</div>
<script src="script.js"></script>
</body>
</html>
