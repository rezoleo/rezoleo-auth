name: Lint & Type Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  action-target-lint:
    name: Action Target Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: action-target
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - run: uv sync --frozen
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run ty check

  registration-lint:
    name: Registration Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: registration-service
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - run: uv sync --frozen
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run ty check
